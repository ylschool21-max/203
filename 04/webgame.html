<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>환경 정화 게임</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0f172a;
            font-family: 'Pretendard', sans-serif;
        }
        #video-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        video {
            transform: scaleX(-1);
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transform: scaleX(-1);
        }
        /* 바닥 새싹 레이어 */
        .garden-floor {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 80px;
            background: linear-gradient(transparent, rgba(20, 83, 45, 0.4));
            display: flex;
            justify-content: space-around;
            align-items: flex-end;
            padding-bottom: 10px;
            pointer-events: none;
            z-index: 5;
        }
        .sprout {
            font-size: 2rem;
            filter: drop-shadow(0 0 5px rgba(34, 197, 94, 0.5));
            transition: transform 0.3s ease;
        }
        .ui-layer {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            z-index: 10;
            pointer-events: none;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }
        .stats-card {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            padding: 15px 25px;
            border-radius: 20px;
            color: white;
            border: 1px solid rgba(56, 189, 248, 0.3);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }
        .home-btn {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            pointer-events: auto;
            transition: all 0.2s;
        }
        .home-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }
        #game-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 20;
            color: white;
        }
        .btn-start {
            background: #10b981;
            padding: 15px 50px;
            border-radius: 50px;
            font-size: 1.5rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            pointer-events: auto;
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.4);
        }
        .btn-start:hover {
            background: #059669;
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(16, 185, 129, 0.6);
        }
    </style>
</head>
<body>

<div id="video-container">
    <video id="input_video" playsinline></video>
    <canvas id="output_canvas"></canvas>

    <div class="garden-floor" id="garden">
        <!-- 새싹들이 자라날 공간 -->
        <span class="sprout">🌱</span>
        <span class="sprout">🌿</span>
        <span class="sprout">🌱</span>
        <span class="sprout">🌱</span>
        <span class="sprout">🌿</span>
        <span class="sprout">🌱</span>
        <span class="sprout">🌿</span>
        <span class="sprout">🌱</span>
    </div>

    <div class="ui-layer">
        <div class="stats-card">
            <div class="text-sm font-medium text-emerald-400">Clean Up Progress</div>
            <div id="score" class="text-4xl font-black">0 / 10</div>
            <div class="text-xs opacity-60 mt-3 uppercase tracking-wider">Remaining Time</div>
            <div id="timer" class="text-2xl font-mono font-bold text-white">60s</div>
        </div>
        
        <!-- 홈 버튼 추가 -->
        <a href="../index.html" class="home-btn" title="홈으로 이동">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
        </a>
    </div>

    <div id="game-overlay">
        <div class="text-6xl mb-4">🧹</div>
        <h1 class="text-5xl font-bold mb-6">환경 정화 대작전</h1>
        <div class="bg-white/5 p-8 rounded-3xl mb-8 text-center text-emerald-100 backdrop-blur-md border border-white/10 max-w-md">
            <p class="mb-6 text-lg">하늘에서 떨어지는 쓰레기를 손으로 치워주세요!<br>깨끗한 정원을 만들어야 해요.</p>
            <div class="grid grid-cols-2 gap-4">
                <div class="p-4 bg-emerald-500/20 rounded-2xl border border-emerald-500/30">
                    <span class="text-3xl">🗑️ 🍌</span><br>
                    <span class="font-bold text-emerald-400">쓰레기: +1점</span>
                </div>
                <div class="p-4 bg-red-500/20 rounded-2xl border border-red-500/30">
                    <span class="text-3xl">💧 💦</span><br>
                    <span class="font-bold text-red-400">빗방울: -1점</span>
                </div>
            </div>
            <p class="mt-6 text-sm opacity-60">1분 안에 쓰레기 10개를 치우면 미션 성공!</p>
        </div>
        <button id="start-btn" class="btn-start">시작하기</button>
    </div>
</div>

<script>
    const videoElement = document.getElementById('input_video');
    const canvasElement = document.getElementById('output_canvas');
    const canvasCtx = canvasElement.getContext('2d');
    const scoreElement = document.getElementById('score');
    const timerElement = document.getElementById('timer');
    const overlay = document.getElementById('game-overlay');
    const startBtn = document.getElementById('start-btn');
    const garden = document.getElementById('garden');

    let score = 0;
    let timeLeft = 60;
    let gameActive = false;
    let items = [];
    let lastHandPos = null;
    const apiKey = ""; 

    const RAINDROPS = ['💧', '💦', '💧', '🌧️', '🌊'];
    const TRASH = ['🗑️', '🥫', '🍌', '🛍️', '🥤'];

    function resizeCanvas() {
        canvasElement.width = window.innerWidth;
        canvasElement.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    // TTS 기능
    async function speak(text) {
        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: `Say naturally: ${text}` }] }],
                    generationConfig: {
                        responseModalities: ["AUDIO"],
                        speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Kore" } } }
                    }
                })
            });
            const result = await response.json();
            const pcmData = result.candidates[0].content.parts[0].inlineData.data;
            playAudioFromBase64(pcmData);
        } catch (e) {
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'ko-KR';
            window.speechSynthesis.speak(msg);
        }
    }

    function playAudioFromBase64(base64) {
        const binaryString = window.atob(base64);
        const len = binaryString.length;
        const bytes = new Uint8Array(len);
        for (let i = 0; i < len; i++) bytes[i] = binaryString.charCodeAt(i);
        
        const wavHeader = new ArrayBuffer(44);
        const view = new DataView(wavHeader);
        const sampleRate = 24000; 
        view.setUint32(0, 0x52494646, false);
        view.setUint32(4, 36 + bytes.length, true);
        view.setUint32(8, 0x57415645, false);
        view.setUint32(12, 0x666d7420, false);
        view.setUint32(16, 16, true);
        view.setUint16(20, 1, true);
        view.setUint16(22, 1, true);
        view.setUint32(24, sampleRate, true);
        view.setUint32(28, sampleRate * 2, true);
        view.setUint16(32, 2, true);
        view.setUint16(34, 16, true);
        view.setUint32(36, 0x64617461, false);
        view.setUint32(40, bytes.length, true);

        const blob = new Blob([wavHeader, bytes], { type: 'audio/wav' });
        const url = URL.createObjectURL(blob);
        const audio = new Audio(url);
        audio.play();
    }

    class GameItem {
        constructor() {
            this.x = Math.random() * canvasElement.width;
            this.y = -50;
            this.isTrash = Math.random() > 0.4; 
            this.symbol = this.isTrash ? TRASH[Math.floor(Math.random() * TRASH.length)] : RAINDROPS[Math.floor(Math.random() * RAINDROPS.length)];
            this.speed = this.isTrash ? (2 + Math.random() * 3) : (5 + Math.random() * 5); 
            this.rotation = 0;
            this.rotationSpeed = this.isTrash ? (Math.random() - 0.5) * 0.15 : 0;
            this.size = this.isTrash ? 50 : 35 + Math.random() * 10;
            this.active = true;
        }

        update() {
            this.y += this.speed;
            this.rotation += this.rotationSpeed;
            if(!this.isTrash) this.x += Math.sin(this.y / 20) * 1.0;
            if (this.y > canvasElement.height + 100) this.active = false;
        }

        draw(ctx) {
            ctx.save();
            ctx.translate(this.x, this.y);
            ctx.rotate(this.rotation);
            
            if (this.isTrash) {
                ctx.shadowBlur = 8;
                ctx.shadowColor = 'rgba(255, 255, 255, 0.3)';
            } else {
                ctx.globalAlpha = 0.7;
            }
            
            ctx.font = `${this.size}px Arial`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(this.symbol, 0, 0);
            
            ctx.restore();
        }

        checkCollision(hx, hy) {
            const dx = this.x - hx;
            const dy = this.y - hy;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < this.size * 0.9) {
                this.active = false;
                return true;
            }
            return false;
        }
    }

    function updateGarden(score) {
        const sprouts = garden.querySelectorAll('.sprout');
        sprouts.forEach((s, idx) => {
            if (idx < score) {
                s.style.transform = `scale(${1 + score * 0.05}) translateY(-${score * 2}px)`;
                s.style.opacity = '1';
                s.innerText = score > 5 ? '🌿' : '🌱';
            } else {
                s.style.opacity = '0.4';
                s.style.transform = 'scale(1)';
            }
        });
    }

    function onResults(results) {
        canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
        
        if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
            const landmark = results.multiHandLandmarks[0][9];
            lastHandPos = {
                x: landmark.x * canvasElement.width,
                y: landmark.y * canvasElement.height
            };

            canvasCtx.beginPath();
            canvasCtx.arc(lastHandPos.x, lastHandPos.y, 45, 0, Math.PI * 2);
            canvasCtx.fillStyle = 'rgba(16, 185, 129, 0.2)';
            canvasCtx.fill();
            canvasCtx.strokeStyle = 'rgba(16, 185, 129, 0.8)';
            canvasCtx.lineWidth = 3;
            canvasCtx.stroke();
        } else {
            lastHandPos = null;
        }

        if (gameActive) {
            if (Math.random() < 0.1) items.push(new GameItem());

            items.forEach(item => {
                item.update();
                item.draw(canvasCtx);

                if (lastHandPos && item.checkCollision(lastHandPos.x, lastHandPos.y)) {
                    if (item.isTrash) {
                        score++;
                        updateGarden(score);
                    } else {
                        score = Math.max(0, score - 1);
                        updateGarden(score);
                    }
                    scoreElement.innerText = `${score} / 10`;
                    
                    if (score >= 10) endGame(true);
                }
            });

            items = items.filter(i => i.active);
        }
    }

    const hands = new Hands({
        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });

    hands.setOptions({
        maxNumHands: 1,
        modelComplexity: 1,
        minDetectionConfidence: 0.6,
        minTrackingConfidence: 0.6
    });
    hands.onResults(onResults);

    const camera = new Camera(videoElement, {
        onFrame: async () => {
            await hands.send({image: videoElement});
        },
        width: 1280,
        height: 720
    });

    function startGame() {
        score = 0;
        timeLeft = 60;
        items = [];
        gameActive = true;
        scoreElement.innerText = `0 / 10`;
        overlay.style.display = 'none';
        updateGarden(0);
        
        const timerInterval = setInterval(() => {
            if (!gameActive) {
                clearInterval(timerInterval);
                return;
            }
            timeLeft--;
            timerElement.innerText = `${timeLeft}s`;
            
            if (timeLeft <= 10) {
                timerElement.classList.add('text-red-400');
            } else {
                timerElement.classList.remove('text-red-400');
            }

            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                endGame(score >= 10);
            }
        }, 1000);
    }

    function endGame(isSuccess) {
        gameActive = false;
        overlay.style.display = 'flex';
        const title = overlay.querySelector('h1');
        const desc = overlay.querySelector('p');
        const icon = overlay.querySelector('.text-6xl');
        
        if (isSuccess) {
            icon.innerText = "🌻";
            title.innerText = "청소 완료!";
            title.className = "text-5xl font-bold mb-6 text-emerald-400";
            desc.innerHTML = `마을이 아주 깨끗해졌어요!<br><b>${60 - timeLeft}초</b> 만에 모두 치우셨네요.`;
            speak("축하합니다! 환경을 깨끗하게 청소하는 데 성공했습니다.");
        } else {
            icon.innerText = "🏚️";
            title.innerText = "시간 종료";
            title.className = "text-5xl font-bold mb-6 text-gray-400";
            desc.innerHTML = `아직 치워야 할 쓰레기가 많아요.<br>최종 점수: <b>${score}점</b>. 다시 청소해볼까요?`;
            speak("아쉽네요. 정원이 아직 지저분해요. 다시 한 번 쓰레기를 치워주세요.");
        }
        
        startBtn.innerText = "다시 청소하기";
    }

    startBtn.addEventListener('click', () => {
        camera.start();
        startGame();
    });

</script>

</body>
</html>
